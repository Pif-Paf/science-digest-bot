name: Daily Science Digest

# Запуск каждый день в 07:00 UTC. Поменяйте под свой часовой пояс.
# Москва (UTC+3): для 07:00 МСК ставьте '0 5 * * *'
on:
  schedule:
    - cron: '0 4 * * *'   # 07:00 UTC ежедневно
  workflow_dispatch:       # ручной запуск из вкладки Actions

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ffmpeg нужен edge-tts для корректной работы с аудио на некоторых системах
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run science digest bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python bot.py

      - name: Log execution
        if: always()
        run: echo "Digest job completed at $(date)"
